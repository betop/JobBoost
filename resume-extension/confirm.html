<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Resume Generator</h1>
        <p>Profile Confirmation</p>
      </div>

      <div class="content">
        <div class="profile-info">
          <h2>Profile Detected</h2>
          <p id="profileName" class="profile-name">Loading...</p>
          <p class="info-text">
            This extension will use this profile to generate resumes and cover
            letters.
          </p>
        </div>

        <button id="confirmBtn" class="btn-primary">Confirm & Activate</button>
      </div>
    </div>

    <script src="confirm.js"></script>
  </body>
</html>
