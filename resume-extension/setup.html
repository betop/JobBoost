<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Generator – Setup</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 36px 32px;
        width: 100%;
        max-width: 420px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .logo h1 {
        font-size: 18px;
        font-weight: 700;
        color: #1e293b;
      }

      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
      }

      input[type="text"] {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        color: #1e293b;
        outline: none;
        transition: border-color 0.15s;
        font-family: monospace;
        letter-spacing: 0.03em;
      }

      input[type="text"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      }

      .error-msg {
        display: none;
        margin-top: 8px;
        font-size: 13px;
        color: #ef4444;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 6px;
        padding: 8px 12px;
      }

      .error-msg.visible { display: block; }

      .success-msg {
        display: none;
        margin-top: 8px;
        font-size: 13px;
        color: #16a34a;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 6px;
        padding: 8px 12px;
      }

      .success-msg.visible { display: block; }

      .btn {
        display: block;
        width: 100%;
        margin-top: 20px;
        padding: 11px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">📄</div>
        <h1>Resume Generator</h1>
      </div>

      <h2>Welcome! Enter Your Token</h2>
      <p class="subtitle">
        Paste the access token provided by your administrator to activate the extension.
      </p>

      <label for="tokenInput">Access Token</label>
      <input
        type="text"
        id="tokenInput"
        placeholder="Paste your token here…"
        autocomplete="off"
        spellcheck="false"
      />

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <button id="saveBtn" class="btn">Validate &amp; Save</button>

      <p class="hint">Your token is stored locally in Chrome and never shared.</p>
    </div>

    <script src="setup.js"></script>
  </body>
</html>
