<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftCV v0.1.1 – Setup</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 36px 32px;
        width: 100%;
        max-width: 420px;
      }

      :root {
        --button-height: 50px;
        --key-input-height: 60px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .logo h1 {
        font-size: 18px;
        font-weight: 700;
        color: #1e293b;
      }

      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      .field-group {
        margin-bottom: 8px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
      }

      input[type="text"] {
        width: 100%;
        height: var(--key-input-height);
        padding: 14px 18px;
        border: 1.5px solid #d1d5db;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 500;
        color: #1e293b;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s, background-color 0.15s;
        font-family: monospace;
        letter-spacing: 0.02em;
        background: #fff;
      }

      input[type="text"]:hover {
        border-color: #94a3b8;
      }

      input[type="text"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      }

      input#tokenInput {
        display: block;
        width: 100%;
        height: var(--button-height);
        padding: 11px 16px;
        border-width: 2px;
        border-color: #cbd5e1;
        border-radius: 12px;
        background: #f8fafc;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      input#tokenInput::placeholder {
        color: #94a3b8;
        font-weight: 500;
      }

      input#tokenInput:hover {
        border-color: #94a3b8;
        background: #f1f5f9;
      }

      input#tokenInput:focus {
        border-color: #6366f1;
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(99,102,241,0.14);
      }

      .token-hint {
        margin-top: 8px;
        font-size: 12px;
        color: #64748b;
        line-height: 1.45;
      }

      .error-msg {
        display: none;
        margin-top: 8px;
        font-size: 13px;
        color: #ef4444;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 6px;
        padding: 8px 12px;
      }

      .error-msg.visible { display: block; }

      .success-msg {
        display: none;
        margin-top: 8px;
        font-size: 13px;
        color: #16a34a;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 6px;
        padding: 8px 12px;
      }

      .success-msg.visible { display: block; }

      .btn {
        display: block;
        width: 100%;
        height: var(--button-height);
        margin-top: 20px;
        padding: 11px 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .btn:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">📄</div>
        <h1>SwiftCV <span style="font-size:0.6em;opacity:0.6;font-weight:400;">v0.1.1</span></h1>
      </div>

      <h2>Welcome! Enter Your Key</h2>
      <p class="subtitle">
        Paste the key provided by your administrator to activate the extension.
      </p>

      <div class="field-group">
        <label for="tokenInput">Key</label>
        <input
          type="text"
          id="tokenInput"
          placeholder="Paste your full key here"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="token-hint">Tip: click once in this field and press <strong>⌘ + V</strong> (Mac) to paste your key.</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <button id="saveBtn" class="btn">Validate &amp; Save</button>

      <p class="hint">Your key is stored locally in Chrome and never shared.</p>
    </div>

    <script src="setup.js"></script>
  </body>
</html>
