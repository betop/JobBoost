<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>PDF Generator Test</title>
<style>
  body { font-family: monospace; padding: 16px; }
  #log { background:#1a1a1a; color:#0f0; padding:12px; font-size:12px; max-height:600px; overflow:auto; white-space:pre; }
  button { margin: 4px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
  .err { color: #f66; }
  .ok  { color: #6f6; }
  .inf { color: #6cf; }
</style>
</head>
<body>
<h2>PDF Generator Test</h2>
<button id="testResume">&#9654; Test Resume PDF</button>
<button id="testCover">&#9654; Test Cover Letter PDF</button>
<button id="testFenced">&#9654; Test Code-Fenced JSON</button>
<pre id="log"></pre>

<script src="jspdf.umd.min.js"></script>
<script src="pdfGenerator.js"></script>
<script>
const logEl = document.getElementById('log');

// Intercept console
const _orig = { log: console.log, warn: console.warn, error: console.error };
['log','warn','error'].forEach(level => {
  console[level] = function(...args) {
    _orig[level](...args);
    const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a,null,2) : String(a)).join(' ');
    const cls = level === 'error' ? 'err' : level === 'warn' ? 'inf' : '';
    logEl.innerHTML += '<span class="' + cls + '">[' + level.toUpperCase() + '] ' + msg.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</span>\n';
    logEl.scrollTop = logEl.scrollHeight;
  };
});

window.onerror = function(msg, src, line, col, err) {
  logEl.innerHTML += '<span class="err">UNCAUGHT: ' + msg + ' @' + line + ':' + col + '\n' + (err && err.stack || '') + '</span>\n';
};
window.onunhandledrejection = function(e) {
  logEl.innerHTML += '<span class="err">UNHANDLED REJECTION: ' + (e.reason && e.reason.message || e.reason) + '</span>\n';
};

function print(msg, cls) {
  cls = cls || '';
  logEl.innerHTML += '<span class="' + cls + '">' + msg.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</span>\n';
  logEl.scrollTop = logEl.scrollHeight;
}

const SAMPLE = {
  resume: {
    name: "Joshua Butler",
    title: "Full Stack Developer",
    email: "joshua@example.com",
    phone: "904-555-1234",
    location: "Jacksonville, FL",
    linkedin: { display: "linkedin.com/in/joshuabutler", url: "https://linkedin.com/in/joshuabutler" },
    summary: "Experienced developer with **8 years** building scalable web applications and APIs.",
    skills: [
      { category: "Languages", values: ["JavaScript", "TypeScript", "Python", "Go"] },
      { category: "Frameworks", values: ["React", "Node.js", "Express", "FastAPI"] },
      { category: "Infrastructure", values: ["Docker", "AWS", "PostgreSQL", "Redis"] }
    ],
    career_breakdowns: [
      {
        job_title: "Senior Software Engineer",
        company: "Acme Technologies",
        location: "Remote",
        date_range: "Jan 2021 - Present",
        company_summary: "*A leading SaaS company specializing in **enterprise automation** tools.*",
        highlights: [
          "Architected **microservices platform** reducing deployment time by **60%**",
          "Led a team of 5 engineers to deliver a real-time **analytics dashboard**",
          "Improved API response times by **40%** through query optimization"
        ],
        tech_stack: ["Node.js", "React", "PostgreSQL", "Docker", "AWS Lambda"]
      }
    ],
    education: [
      { degree_name: "BS Computer Science", institution: "University of Florida", year: "2017" }
    ],
    certifications: [
      { name: "AWS Solutions Architect", issuer: "Amazon Web Services", value_proposition: "Cloud expertise." }
    ],
    key_projects: [
      { name: "CLI Tool", company: "Personal", year: "2023", description: "Built **cross-platform** CLI.", tech: ["Go"] }
    ],
    awards_recognition: [
      { name: "Engineer of the Year", company: "Acme", year: "2022", description: "Outstanding work." }
    ]
  },
  cover_letter: {
    paragraphs: [
      "Dear Hiring Manager, I am writing to express my interest in this role.",
      "In my current role I have delivered significant results.",
      "I would welcome the opportunity to discuss further."
    ]
  }
};

async function runTest(label, inputData, type) {
  print('\n' + '='.repeat(60), '');
  print('RUNNING: ' + label, 'inf');
  try {
    const gen = new PDFGenerator();
    await gen.init();
    print('  init() OK', 'ok');
    let result;
    if (type === 'cover') {
      result = gen.generateCoverLetterPDF(inputData, 'test_cover.pdf');
    } else {
      result = gen.generateResumePDF(inputData, 'test_resume.pdf');
    }
    print('  generatePDF OK, dataUri length: ' + result.dataUri.length, 'ok');
    // Download
    const a = document.createElement('a');
    a.href = result.dataUri;
    a.download = result.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    print('  Downloaded: ' + result.filename, 'ok');
    return result;
  } catch(e) {
    print('  FAILED: ' + e.message + '\n' + (e.stack||''), 'err');
    return null;
  }
}

document.getElementById('testResume').onclick = () => runTest('Resume (object input)', SAMPLE, 'resume');
document.getElementById('testCover').onclick = () => runTest('Cover Letter (object input)', SAMPLE, 'cover');
document.getElementById('testFenced').onclick = () => {
  const fenced = '```json\n' + JSON.stringify(SAMPLE) + '\n```';
  runTest('Resume (code-fenced string)', fenced, 'resume');
};

// AUTO-RUN on load
window.addEventListener('load', async () => {
  print('=== AUTO TEST on load ===', 'inf');
  await runTest('AUTO: Resume PDF', SAMPLE, 'resume');
  print('=== Auto test done. Click buttons for more. ===', 'inf');
});
</script>
</body>
</html>
}

document.getElementById('testResume').onclick = () => runTest('resume');
document.getElementById('testCover').onclick  = () => runTest('cover');
print('Ready. Click a button to test.');
</script>
</body>
</html>
